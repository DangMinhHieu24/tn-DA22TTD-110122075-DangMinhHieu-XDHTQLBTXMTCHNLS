name: nanglungsach
description: Hệ thống quản lý bảo trì xe điện thông minh
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # Core packages
  core:
    path: packages/core
  design_system:
    path: packages/design_system
  
  # Feature packages
  auth:
    path: packages/features/auth
  technician:
    path: packages/features/technician
  admin:
    path: packages/features/admin
  customer:
    path: packages/features/customer
  
  # State management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # DI
  get_it: ^7.6.4
  injectable: ^2.3.2
  
  # Date formatting
  intl: ^0.20.2
  
  # Supabase
  supabase_flutter: ^2.5.0
  
  # Image picker
  image_picker: ^1.1.2
  
  # QR Scanner
  mobile_scanner: ^5.2.3

  # QR Generator
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  injectable_generator: ^2.4.1
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter_native_splash:
  color: "#006E2F"
  image: "assets/app_icon.png"
  android_12:
    image: "assets/app_icon.png"
    color: "#006E2F"

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/Roboto-Variable.ttf

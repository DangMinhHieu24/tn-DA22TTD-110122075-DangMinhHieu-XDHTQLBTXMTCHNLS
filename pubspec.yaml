name: nanglungsach
description: Hệ thống quản lý bảo trì xe điện thông minh
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Core packages
  core:
    path: packages/core
  design_system:
    path: packages/design_system
  
  # Feature packages
  auth:
    path: packages/features/auth
  technician:
    path: packages/features/technician
  admin:
    path: packages/features/admin
  customer:
    path: packages/features/customer
  
  # State management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # DI
  get_it: ^7.6.4
  injectable: ^2.3.2
  
  # Date formatting
  intl: ^0.19.0
  
  # Supabase
  supabase_flutter: ^2.5.0
  
  # Image picker
  image_picker: ^1.1.2
  
  # QR Scanner
  mobile_scanner: ^5.0.0

  # QR Generator
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  injectable_generator: ^2.4.1

flutter:
  uses-material-design: true
